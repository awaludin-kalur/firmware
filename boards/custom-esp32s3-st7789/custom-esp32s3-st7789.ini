; ============================================================
; boards/custom-esp32s3-st7789/custom-esp32s3-st7789.ini
; Environment PlatformIO untuk board custom:
;   ESP32-S3 (N8R2, 8MB flash + 2MB PSRAM) + ST7789 1.14" 135x240
;
; Mengikuti pola resmi Bruce: board custom terdaftar lewat JSON di
; boards/_boards_json/custom-esp32s3-st7789.json, BUKAN numpang ke
; board official "esp32-s3-devkitc-1".
; ============================================================

[env:custom-esp32s3-st7789]
board = custom-esp32s3-st7789
; Skema partisi default_8MB.csv sudah diatur lewat boards/_boards_json/custom-esp32s3-st7789.json
; (field build.arduino.partitions), jadi tidak perlu di-override di sini kecuali kamu
; punya file partisi custom sendiri.
build_src_filter = ${env.build_src_filter} +<../boards/custom-esp32s3-st7789>

build_flags =
    ${env.build_flags}
    -Iboards/custom-esp32s3-st7789
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DDEVICE_NAME='"Custom ESP32-S3 ST7789"'
    ; Set opsi ini biar semua GPIO 1-44 bisa dipilih buat IR/RF, kecuali pin TFT/SD
    -DALLOW_ALL_GPIO_FOR_IR_RF=1

lib_deps =
    ${env.lib_deps}
