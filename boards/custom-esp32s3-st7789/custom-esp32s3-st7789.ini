; ============================================================
; boards/custom-esp32s3-st7789/custom-esp32s3-st7789.ini
; Board custom: ESP32-S3 N8R2 (8MB flash + 2MB PSRAM, quad)
;              + ST7789 1.14" 135x240 IPS (SPI)
; ============================================================

[env:custom-esp32s3-st7789]
extends = env
board = esp32-s3-devkitc-1

; N8R2 = 8MB flash + 2MB PSRAM QUAD (bukan octal, jadi jangan pakai qio_opi)
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_qspi

build_flags =
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-include boards/custom-esp32s3-st7789/pins_arduino.h
